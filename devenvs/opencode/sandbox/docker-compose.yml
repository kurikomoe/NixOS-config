services:
  opencode:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        LOCAL_USER: ${USER:-ubuntu}
        LOCAL_UID: ${UID:-1000}
        LOCAL_GID: ${GID:-1000}
    image: opencode:ubuntu-26.04
    container_name: opencode-sandbox
    # user: "${UID:-1000}:${GID:-1000}"
    working_dir: ${PWD}
    network_mode: host
    environment:
      - HOME=/home/${USER}
      - XDG_RUNTIME_DIR=/run/user/${UID:-1000}
    stdin_open: true
    tty: true
    volumes:
      # System mounts
      - /nix:/nix:ro
      - /run/user/${UID:-1000}:/run/user/${UID:-1000}
      - /etc/passwd:/etc/passwd:ro
      - /etc/group:/etc/group:ro

      # Agenix secrets (read-only)
      - ${HOME}/.agenix:${HOME}/.agenix:ro

      # Agent configurations and persistent state
      - ${HOME}/.agents:${HOME}/.agents
      - ${HOME}/.local/state/opencode:${HOME}/.local/state/opencode
      - ${HOME}/.local/share/opencode:${HOME}/.local/share/opencode
      - ${HOME}/.config/opencode:${HOME}/.config/opencode
      - ${HOME}/.cache/opencode:${HOME}/.cache/opencode

      # GitHub CLI config (optional - uncomment to persist gh auth)
      - ${HOME}/.config/gh:${HOME}/.config/gh

      # SSH keys (optional - uncomment for git over SSH)
      # - ${HOME}/.ssh:${HOME}/.ssh:ro

      # GPG keys (optional - uncomment for signing commits)
      # - ${HOME}/.gnupg:${HOME}/.gnupg:ro

      # Working directory mount
      - ${PWD}:${PWD}
